<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game 1: Shoot the Heart 🏹</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            cursor: crosshair; 
            overflow: hidden;
        }
        
        /* Papan skor estetik di atas */
        .score-board { 
            position: absolute; 
            top: 25px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: white; 
            padding: 12px 28px; 
            border-radius: 50px; 
            font-weight: 700; 
            color: #ff477e; 
            border: 3px solid #ffb3c6; 
            z-index: 10;
            font-family: 'Fredoka', sans-serif;
            box-shadow: 0 10px 20px rgba(255, 71, 126, 0.15);
        }

        /* CSS FIX: Mengubah .heart jadi .game-heart agar TIDAK BENTROK dengan template */
        .game-heart { 
            position: absolute; 
            width: 45px; 
            height: 45px; 
            background-color: #ff758f; 
            transform: rotate(-45deg); 
            cursor: pointer; 
            z-index: 5;
        }
        .game-heart::before, .game-heart::after { 
            content: ""; 
            position: absolute; 
            width: 45px; 
            height: 45px; 
            background-color: #ff758f; 
            border-radius: 50%; 
        }
        .game-heart::before { top: -22.5px; left: 0; }
        .game-heart::after { top: 0; left: 22.5px; }

        /* Modal pop up kemenangan */
        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(255, 240, 243, 0.85); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            backdrop-filter: blur(8px); 
        }
    </style>
</head>
<body>
    <div class="sparkle-overlay"></div>
    
    <div class="score-board">🏹 Hati Terkumpul: <span id="score">0</span> / 14</div>

    <div class="modal-overlay" id="winModal">
        <div class="container animate-slow" style="max-width: 400px; text-align: center;">
            <h2 class="title-script" style="font-size: 2rem; color: #ff477e; margin-bottom: 10px;">Edan Ah, Jago Juga! 🙄</h2>
            <p style="font-family:'Fredoka',sans-serif; font-weight:600; color:#590d22; margin-bottom:20px; line-height: 1.5;">
                Hati aku udah kamu kumpulin semua. Tapi jangan bangga dulu ya Pija, tekan tombol di bawah buat lanjut ke game ke 2!
            </p>
            <button class="btn-primary-pink" onclick="location.href='game2.html'" style="width: 100%; padding: 15px; font-family: 'Fredoka', sans-serif;">
                Lanjut Game 2 ✨
            </button>
        </div>
    </div>

    <script>
        let score = 0;
        function createHeart() {
            if (score >= 14) return;
            
            const heart = document.createElement('div');
            // Menggunakan class baru agar tidak tabrakan
            heart.classList.add('game-heart');
            heart.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            heart.style.bottom = '-60px';
            document.body.appendChild(heart);
            
            let pos = -60;
            const move = setInterval(() => {
                pos += 2.5; 
                heart.style.bottom = pos + 'px';
                
                if (pos > window.innerHeight) { 
                    clearInterval(move); 
                    heart.remove(); 
                    createHeart(); 
                }
            }, 16);
            
            heart.onclick = () => { 
                clearInterval(move); 
                heart.remove(); 
                score++; 
                document.getElementById('score').innerText = score; 
                
                if (score >= 14) {
                    document.getElementById('winModal').style.display = 'flex'; 
                } else {
                    createHeart(); 
                }
            };
        }
        
        // Memunculkan 4 hati di awal permainan
        for(let i=0; i<4; i++) {
            setTimeout(createHeart, i * 600);
        }
    </script>
</body>
</html>
