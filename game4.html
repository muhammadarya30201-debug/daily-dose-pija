<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game 4: Tebak Angka Keberuntungan 🎲</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Kotak area game tebak angka */
        .game-box {
            background: white;
            border: 3px dashed #ff477e;
            border-radius: 25px;
            padding: 25px;
            max-width: 360px;
            width: 100%;
            margin: 20px auto 0 auto;
            box-sizing: border-box;
        }
        
        /* Input form angka */
        .input-angka {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #ffb3c6;
            border-radius: 15px;
            text-align: center;
            font-family: 'Fredoka', sans-serif;
            color: #590d22;
            outline: none;
            box-sizing: border-box;
        }
        
        /* Teks petunjuk (clue) */
        .clue-text {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            color: #ff477e;
            margin-top: 15px;
            min-height: 24px;
            text-align: center;
        }
        
        /* Latar belakang hitam transparan/blur untuk pop up */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 243, 0.85);
            display: none;
            justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* Layar loading full screen */
        #loadingScreenFinal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ffe5ec; z-index: 999;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Fredoka', sans-serif;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="sparkle-overlay"></div>

    <div class="container animate-pop" style="max-width: 400px; width: 100%; text-align: center; box-sizing: border-box;">
        <h1 class="title-script" style="font-size: 28px; color: #ff477e; margin-bottom: 10px;">Game Terakhir! 🎲</h1>
        <p style="font-family: 'Fredoka', sans-serif; font-weight: 600; color: #590d22; line-height: 1.4; margin-bottom: 10px;">
            Tebak angka rahasia antara 1 sampai 20 pilihan Patir!
        </p>

        <div class="game-box">
            <input type="number" id="tebakan" class="input-angka" placeholder="Masukkan angka..." min="1" max="20">
            <div id="clue" class="clue-text">Coba masukkan angka dulu ya! 😉</div>
            
            <button class="btn-primary-pink" onclick="cekTebakan()" style="width: 100%; margin-top: 20px; padding: 14px; font-family:'Fredoka', sans-serif; font-weight:700; font-size: 1rem;">
                Tebak Angka! 🚀
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="winModal">
        <div class="container animate-slow" style="max-width: 380px; width: 100%; text-align: center; box-sizing: border-box;">
            <h2 class="title-script" style="font-size: 2rem; color: #ff477e; margin-bottom: 10px;">Horeee Menang! 🥳🎉</h2>
            <p style="font-family:'Fredoka',sans-serif; font-weight:600; color:#590d22; line-height: 1.5; margin-bottom: 20px;">
                Kamu berhasil nyelesaiin semua tantangan! Sekarang saatnya buka hadiah utama kamu.
            </p>
            <button class="btn-primary-pink" onclick="transisiKeSurat()" style="width: 100%; padding: 15px; font-family:'Fredoka', sans-serif; font-size: 1rem;">
                Buka Surat Spesial ❤️
            </button>
        </div>
    </div>

    <div id="loadingScreenFinal">
        <div style="font-size:4rem; animation: pulse 0.8s infinite alternate;">🦋</div>
        <div style="margin-top:20px; font-weight:700; color:#ff477e; font-size:1.3rem;">Membuka surat rahasia...</div>
    </div>

    <script>
        const angkaRahasia = 13; 

        function cekTebakan() {
            const input = document.getElementById('tebakan');
            const clue = document.getElementById('clue');
            const userGuess = parseInt(input.value);

            if (isNaN(userGuess) || userGuess < 1 || userGuess > 20) {
                clue.innerText = "Masukkan angka 1 sampai 20 dong Pija! 🙄";
                return;
            }

            if (userGuess === angkaRahasia) {
                clue.innerText = "Bener banget! Kamu emang jodoh aku wkwk. ❤️";
                document.getElementById('winModal').style.display = 'flex';
            } else if (userGuess < angkaRahasia) {
                clue.innerText = "Kekecilan! Coba angka yang lebih besar... ⬆️";
            } else {
                clue.innerText = "Kelebihan! Turunin dikit angkanya... ⬇️";
            }
            input.value = '';
            input.focus();
        }

       function transisiKeSurat() {
    document.getElementById('winModal').style.display = 'none';
    document.getElementById('loadingScreenFinal').style.display = 'flex';

    // Mengarah ke file curhatan / notes-jeda.html terlebih dahulu
    setTimeout(() => { 
        window.location.href = 'notes-jeda.html'; 
    }, 3000);
}
    </script>
</body>
</html>
