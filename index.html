<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Pija ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #ffe5ec; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .overlay-music { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffe5ec; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease; }
        .heart-btn { font-size: 5rem; background: none; border: none; cursor: pointer; animation: heartbeat 1.2s infinite; transition: transform 0.2s; }
        .heart-btn:hover { transform: scale(1.1); }
        @keyframes heartbeat { 0% { transform: scale(1); } 20% { transform: scale(1.1); } 40% { transform: scale(1); } 60% { transform: scale(1.15); } 80%, 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- Overlay Musik Awal -->
    <div class="overlay-music" id="musicOverlay">
        <button class="heart-btn" onclick="startEverything()">💖</button>
        <h2 style="font-family: 'Fredoka', sans-serif; color: #ff477e; margin-top: 20px;">Buka Pesan ✨</h2>
    </div>

    <!-- Audio Player -->
    <audio id="bgMusic" loop>
        <source src="assets/music-pija.mp3" type="audio/mpeg">
    </audio>

    <!-- Kontainer Iframe Utama -->
    <iframe src="welcome.html" id="gameWindow" allow="autoplay"></iframe>

    <script>
        function startEverything() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(error => console.log("Playback dicegah oleh browser:", error));
            
            const overlay = document.getElementById('musicOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
        }
    </script>
</body>
</html>
